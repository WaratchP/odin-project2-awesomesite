<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Website!</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="block intro">
        <div class="container intro-space"></div>
        <div class="container intro">
            <div class="content header">
                <p class="header logo-text">Header Logo</p>
                <ul class="header link-text">
                    <li><a href="https://www.google.com">header link one</a></li>
                    <li><a href="https://www.google.com">header link two</a></li>
                    <li><a href="https://www.google.com">header link three</a></li>
                </ul>
            </div>
            <div class="content main">
                <div class="group text">
                    <h1 class="hero-text">This website is awesome</h1>
                    <p class="secondary-text">
                        This website has some subtext that goes here 
                        under the main title. It's a smaller and the
                        color is lower contrast.
                    </p>
                    <button class="signup-button">Sign up</button>
                </div>
                <div class="group image">
                    <img src="img/header-img.jpg" width="400px" height="250px" />
                </div>
            </div>
        </div>
        <div class="container intro-space"></div>
    </div>
</body>
</html>
